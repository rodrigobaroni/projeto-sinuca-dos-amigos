<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Placar da Sinuca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   CONFIG DE CORES — tema "pano de mesa de sinuca"
   ============================================================ */
:root{
  --felt:#0c3b2a;          /* fundo: pano verde escuro */
  --felt-rail:#082a1e;     /* tabela / barra de baixo */
  --card:#14503a;          /* cartao em relevo */
  --card-2:#0f4231;        /* cartao alternado */
  --cue:#f3efe3;           /* texto creme (bola branca) */
  --muted:#8fb3a2;         /* texto secundario */
  --chalk:#34b9d6;         /* azul giz: interacao */
  --gold:#f4c430;          /* amarelo bola 1: vencedor / destaque */
  --brass:#c9a24b;         /* latao: detalhes / divisorias */
  --clay:#d2674f;          /* vermelho bola 3: derrota */
  --line:rgba(201,162,75,.18);
  --page-max:1120px;
  --content-gap:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
input,select,button{font:inherit;min-width:0}
body{
  font-family:'Archivo',system-ui,sans-serif;
  color:var(--cue);
  background:
    radial-gradient(120% 80% at 50% -10%, #115a40 0%, var(--felt) 55%, #07271c 100%);
  background-attachment:fixed;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}
.app{width:min(100%,var(--page-max));margin:0 auto;padding:0 16px 110px;min-height:100dvh}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:30;
  margin:0 -16px 14px;padding:14px 16px 12px;
  background:linear-gradient(180deg, rgba(8,42,30,.96), rgba(8,42,30,.82) 70%, transparent);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
#view{width:100%}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .ball8{flex:0 0 auto}
.brand h1{
  font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.5px;
  font-size:21px;line-height:1;text-transform:uppercase;
}
.brand h1 small{display:block;font-family:'Space Mono';font-size:10px;letter-spacing:3px;color:var(--brass);margin-top:3px}
.who{font-family:'Space Mono';font-size:12px;color:var(--muted);text-align:right;line-height:1.3}
.who b{color:var(--gold)}

/* ---------- Tipografia utilitaria ---------- */
.eyebrow{font-family:'Space Mono';font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--brass)}
.viewtitle{font-family:'Anton';font-size:31px;line-height:.95;text-transform:uppercase;margin:2px 0 16px}
.stat-num{font-family:'Space Mono';font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- Bolas (assinatura visual) ---------- */
.ball{
  border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  position:relative;flex:0 0 auto;color:#fff;font-weight:700;overflow:hidden;
  box-shadow:inset -3px -4px 7px rgba(0,0,0,.45), inset 2px 2px 5px rgba(255,255,255,.25), 0 2px 4px rgba(0,0,0,.3);
}
.ball::after{ /* brilho */
  content:"";position:absolute;top:12%;left:20%;width:30%;height:24%;z-index:3;
  border-radius:50%;background:rgba(255,255,255,.55);filter:blur(1px);pointer-events:none;
}
.ball .stripe{ /* faixa colorida das bolas listradas (9-15) */
  position:absolute;left:-5%;right:-5%;top:50%;transform:translateY(-50%);z-index:0;
}
.ball .disc{ /* circulo branco central com o numero */
  background:#f7f4ec;color:#1c2421;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-weight:700;z-index:2;
}
.ballbtn{background:none;border:none;padding:0;cursor:pointer;line-height:0;transition:transform .08s ease}
.ballbtn:active{transform:scale(.9)}

/* ---------- Cartoes / listas ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.panel{min-width:0}
.view-head{margin-bottom:16px}
.rank-row{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px;
  background:var(--card);border:1px solid var(--line);margin-bottom:8px;cursor:pointer;
  transition:transform .08s ease, background .15s ease;
}
.rank-list,.match-list{display:grid;gap:8px}
.rank-row:active{transform:scale(.99)}
.rank-row.top:nth-child(1){border-color:rgba(244,196,48,.5);background:linear-gradient(100deg,rgba(244,196,48,.12),var(--card) 45%)}
.rank-info{flex:1;min-width:0}
.rank-name{font-weight:700;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-sub{font-family:'Space Mono';font-size:12px;color:var(--muted);margin-top:2px}
.rank-wl{text-align:right;font-family:'Space Mono';line-height:1.15}
.rank-wl .pct{font-size:21px;font-weight:700;color:var(--gold)}
.rank-wl .wl{font-size:12px;color:var(--muted)}
.streak{display:inline-flex;align-items:center;gap:3px;color:var(--gold)}

/* ---------- Pills / filtros ---------- */
.search{
  width:100%;max-width:100%;min-width:0;background:var(--felt-rail);border:1px solid var(--line);color:var(--cue);
  border-radius:12px;padding:11px 14px;font-family:'Archivo';font-size:16px;margin-bottom:14px;
  overflow:hidden;
}
.search::placeholder{color:var(--muted)}
.select{
  width:100%;max-width:100%;min-width:0;background:var(--felt-rail);border:1px solid var(--line);color:var(--cue);
  border-radius:12px;padding:12px 14px;font-family:'Archivo';font-size:16px;
  appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--brass) 50%),linear-gradient(135deg,var(--brass) 50%,transparent 50%);
  background-position:calc(100% - 18px) center, calc(100% - 13px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;
}
.search[type="datetime-local"]{
  display:block;appearance:none;-webkit-appearance:none;text-align:left;line-height:1.2;
}
.search[type="datetime-local"]::-webkit-date-and-time-value{
  display:block;width:100%;min-width:0;text-align:left;
}
.search[type="datetime-local"]::-webkit-calendar-picker-indicator{
  flex:0 0 auto;margin-left:6px;
}
label.fld{display:block;margin-bottom:12px;min-width:0}
label.fld span{display:block;font-family:'Space Mono';font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--brass);margin-bottom:6px}

/* ---------- Match feed ---------- */
.match{display:flex;align-items:center;gap:8px;padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--line);margin-bottom:8px;cursor:pointer}
.match .side{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.match .side.right{justify-content:flex-end;text-align:right}
.match .pname{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match .pname.win{color:var(--gold)}
.match .vs{font-family:'Anton';color:var(--muted);font-size:13px;flex:0 0 auto;padding:0 2px}
.match .date{font-family:'Space Mono';font-size:11px;color:var(--muted);text-align:center;margin-top:6px}

/* ---------- Records ---------- */
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rec{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;position:relative;overflow:hidden}
.rec .label{font-family:'Space Mono';font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--brass);line-height:1.3}
.rec .val{font-family:'Anton';font-size:31px;line-height:1;margin:8px 0 4px;color:var(--gold)}
.rec .holder{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec.full{grid-column:1/-1}
.months{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;margin-bottom:6px;-webkit-overflow-scrolling:touch}
.months::-webkit-scrollbar{height:0}
.mchip{flex:0 0 auto;background:var(--felt-rail);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:8px 14px;font-family:'Space Mono';font-size:13px;cursor:pointer;white-space:nowrap}
.mchip.active{background:var(--gold);color:#22180a;border-color:var(--gold);font-weight:700}

/* ---------- Botoes ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--gold);color:#22180a;border:none;border-radius:14px;
  font-family:'Archivo';font-weight:700;font-size:17px;padding:14px;cursor:pointer;
}
.btn:active{transform:scale(.99)}
.btn.ghost{background:transparent;color:var(--cue);border:1px solid var(--line)}
.btn.chalk{background:var(--chalk);color:#062028}
.btn.small{width:auto;padding:9px 14px;font-size:14px;border-radius:11px}
.btn:disabled{opacity:.5}

/* ---------- Bottom nav ---------- */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:linear-gradient(180deg,rgba(8,42,30,.6),var(--felt-rail) 40%);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}
.nav-in{width:min(100%,var(--page-max));margin:0 auto;display:flex;justify-content:space-around}
.nav-btn{
  background:none;border:none;color:var(--muted);font-family:'Archivo';font-size:10.5px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 3px;cursor:pointer;flex:1;
}
.nav-btn svg{width:21px;height:21px}
.nav-btn.active{color:var(--gold)}
.nav-btn.admin.active{color:var(--chalk)}

/* ---------- Sheet / modal ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(2,15,10,.6);z-index:50;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{
  background:var(--felt-rail);border:1px solid var(--line);border-bottom:none;
  width:100%;max-width:540px;border-radius:22px 22px 0 0;padding:20px 18px calc(24px + env(safe-area-inset-bottom));
  max-height:88dvh;overflow:auto;animation:up .22s ease;
}
@keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
.grip{width:42px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 14px}
.ballrow{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:10px;margin-bottom:6px;font-size:14px}
.ballrow .n{font-family:'Space Mono';color:var(--muted);width:22px;flex:0 0 auto;text-align:center}
.ballrow .dtag{font-family:'Space Mono';font-size:12px;color:var(--muted);white-space:nowrap;flex:0 0 auto;min-width:44px}

/* ---------- Toast ---------- */
#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--card);border:1px solid var(--brass);color:var(--cue);padding:11px 18px;border-radius:99px;
  font-size:15px;font-weight:600;opacity:0;pointer-events:none;transition:.25s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;color:var(--muted);padding:40px 16px;font-size:15px}
.loading{text-align:center;color:var(--muted);padding:50px;font-family:'Space Mono';font-size:14px;letter-spacing:1px}
.hidden{display:none!important}
/* primeira letra de todo texto em maiúscula */
.app ::first-letter, .sheet ::first-letter, nav ::first-letter, #toast::first-letter{text-transform:uppercase}
hr.brass{border:none;border-top:1px solid var(--line);margin:16px 0}
.row2{display:flex;gap:10px}
.row2>*{flex:1;min-width:0}
.rules-grid,.admin-grid,.dashboard-grid{display:grid;gap:var(--content-gap)}
.full-span{grid-column:1/-1}

@media (min-width:700px){
  :root{--content-gap:20px}
  .app{padding:0 24px 112px}
  header{
    margin:0 0 24px;padding:18px 20px 16px;border-radius:0 0 22px 22px;
    border:1px solid var(--line);border-top:none;
  }
  .brand h1{font-size:26px}
  .brand h1 small{font-size:11px}
  .who{font-size:13px}
  .viewtitle{font-size:42px;margin-bottom:0}
  .view-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:20px}
  .card{border-radius:18px;padding:18px}
  .search,.select{min-height:48px}
  .rank-list{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .rank-row{margin-bottom:0;padding:14px}
  .rank-row.top:nth-child(1){grid-column:1/-1}
  .match-list{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .match{margin-bottom:0;padding:14px}
  .rec-grid{grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .rec.full{grid-column:span 2}
  .rules-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .admin-grid{grid-template-columns:minmax(260px,.9fr) minmax(360px,1.1fr);align-items:start}
  .sheet-bg{align-items:center;padding:24px}
  .sheet{
    max-width:min(720px,calc(100vw - 48px));border-radius:24px;border-bottom:1px solid var(--line);
    padding:22px;max-height:min(760px,calc(100dvh - 48px));
  }
  .nav-in{max-width:760px}
  .nav-btn{font-size:12px;gap:5px;padding:8px 6px}
  .nav-btn svg{width:23px;height:23px}
}

@media (min-width:980px){
  .app{padding-left:28px;padding-right:28px}
  .dashboard-grid{grid-template-columns:minmax(0,1fr) 360px;align-items:start}
  .rank-list{grid-template-columns:repeat(3,minmax(0,1fr))}
  .rank-row.top:nth-child(1){grid-column:auto}
  .match-list{grid-template-columns:repeat(3,minmax(0,1fr))}
  .rules-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .rec-grid{grid-template-columns:repeat(5,minmax(0,1fr))}
  .rec.full{grid-column:span 2}
}

@media (max-width:380px){
  .app{padding-left:12px;padding-right:12px}
  header{margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px}
  .brand h1{font-size:19px}
  .who{font-size:11px}
  .rank-wl .pct{font-size:18px}
  .rec-grid{grid-template-columns:1fr}
  .row2{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="ball8" id="logoBall"></span>
      <h1>Placar da Sinuca<small id="tagline">RESENHA OFICIAL</small></h1>
    </div>
    <div class="who" id="whoami">modo leitura</div>
  </header>

  <main id="view"><div class="loading">engiZando o taco...</div></main>
</div>

<nav><div class="nav-in" id="nav"></div></nav>

<div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>

<script>
/* ============================================================
   1) CONFIGURACAO — PREENCHA AS DUAS LINHAS ABAIXO
   (pegue no Supabase: Project Settings > API)
   ============================================================ */
const SUPABASE_URL  = "https://jxamljlenizxqijsaale.supabase.co";   // ex: https://abcd1234.supabase.co
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4YW1samxlbml6eHFpanNhYWxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjY5ODQsImV4cCI6MjA5NzgwMjk4NH0.VxntkwQAbRP8pSa0pK3FFfdfwXx93y1gxxRHdPgOnj8";        // a chave "anon public"

/* ============================================================ */
const DEMO_PARAMS = new URLSearchParams(location.search);
const DEMO_MODE = DEMO_PARAMS.has("demo");
const DEMO_START_FORM = DEMO_PARAMS.get("demo")==="start";
const HAS_SUPABASE_CONFIG = /^https:\/\/.+\.supabase\.co\/?$/.test(SUPABASE_URL) && SUPABASE_ANON && !SUPABASE_ANON.includes("COLE_AQUI");
const sb = HAS_SUPABASE_CONFIG ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
const $ = s => document.querySelector(s);
const view = $("#view");

let PLAYERS = [];      // {id,name}
let MATCHES = [];      // todas, ordenadas por played_at asc
let FINISHED = [];     // somente partidas finalizadas (contam pro placar)
let liveMatch = null;  // partida em andamento (status='live'), se houver
let STATS = {};        // por id: {wins,losses,total,pct,curStreak,bestStreak}
let isAdmin = false;
let current = "ranking";

const POOL_COLORS = ["#f4c430","#1f6fb2","#c0392b","#6c3483","#e67e22","#1e8449","#7b241c","#1c1c1c"];
// cores oficiais das bolas 1-15 (lisas 1-8, listradas 9-15 repetem a cor)
const BALL_COLORS = {
  1:"#f3c220", 2:"#1f66b0", 3:"#c8202a", 4:"#6b2c91", 5:"#e8731c", 6:"#1b7a3d", 7:"#7a3b1e", 8:"#1a1a1a",
  9:"#f3c220",10:"#1f66b0",11:"#c8202a",12:"#6b2c91",13:"#e8731c",14:"#1b7a3d",15:"#7a3b1e"
};
const fmtDate = ts => new Date(ts).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
const fmtFull = ts => new Date(ts).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});

function hashColor(str){
  let h=0; for(const c of str) h=(h*31+c.charCodeAt(0))&0xffffff;
  return `hsl(${h%360} 55% 42%)`;
}
function initials(name){return (name||"?").trim().slice(0,2).toUpperCase();}

/* desenha uma "bola" de sinuca */
function ballHTML({size=34,color="#1c1c1c",num=null,text=null,striped=false}){
  const fs = Math.round(size*0.4);
  const disc = Math.round(size*0.62);
  const inner = num!=null
    ? `<span class="disc" style="width:${disc}px;height:${disc}px;font-size:${Math.round(disc*0.55)}px">${num}</span>`
    : `<span style="font-size:${fs}px;z-index:1">${text??""}</span>`;
  return `<span class="ball" style="width:${size}px;height:${size}px;background:${color}">${inner}</span>`;
}
function playerBall(p,size=34){
  return ballHTML({size,color:hashColor(p?.name||"?"),text:initials(p?.name)});
}
function rankBall(rank,size=34){
  const c = POOL_COLORS[(rank-1)%POOL_COLORS.length];
  return ballHTML({size,color:c,num:rank});
}
/* bola de sinuca 1-15: lisa (1-8) ou listrada (9-15) */
function poolBallHTML(num,size=42){
  num=parseInt(num,10);
  const color=BALL_COLORS[num]||"#444";
  const disc=Math.round(size*0.5), fs=Math.round(disc*0.6);
  const discEl=`<span class="disc" style="width:${disc}px;height:${disc}px;font-size:${fs}px">${num}</span>`;
  if(num>=9){ // listrada: bola branca com faixa colorida
    return `<span class="ball" style="width:${size}px;height:${size}px;background:#f4f1e6">
      <span class="stripe" style="background:${color};height:${Math.round(size*0.55)}px"></span>${discEl}</span>`;
  }
  return `<span class="ball" style="width:${size}px;height:${size}px;background:${color}">${discEl}</span>`;
}
/* mostra a "bola" no log: bola de verdade (1-15), branca, ou texto */
function ballLabelHTML(label,size=24){
  const t=String(label).trim(), n=parseInt(t,10);
  if(t==='branca') return whiteBallHTML(size);
  if(String(n)===t && n>=1 && n<=15) return poolBallHTML(n,size);
  return `<b>${esc(label)}</b>`;
}
function whiteBallHTML(size=42){
  return `<span class="ball" style="width:${size}px;height:${size}px;background:#f4f1e6;border:1px solid rgba(0,0,0,.15)"></span>`;
}

/* ---------- carregar dados ---------- */
async function load(){
  if(!sb){
    if(DEMO_MODE){
      loadDemoData();
      return true;
    }
    view.innerHTML=`<div class="empty">Configure o Supabase no topo do arquivo para carregar suas partidas.<br><small style="color:var(--brass)">Dica: abra com <b>?demo=1</b> para visualizar o layout responsivo com dados fictícios.</small></div>`;
    return false;
  }
  const [{data:pl,error:e1},{data:mt,error:e2}] = await Promise.all([
    sb.from("players").select("*").order("name"),
    sb.from("matches").select("*").order("played_at",{ascending:true})
  ]);
  if(e1||e2){ view.innerHTML=`<div class="empty">Nao consegui conectar no banco.<br>Confira a URL e a chave no topo do arquivo.<br><small style="color:var(--clay)">${(e1||e2).message}</small></div>`; return false; }
  PLAYERS = pl||[]; MATCHES = mt||[];
  FINISHED = MATCHES.filter(m=>m.status!=='live' && m.winner_id);
  liveMatch = MATCHES.find(m=>m.status==='live') || null;
  computeStats();
  return true;
}

function loadDemoData(){
  const ids=["rafa","dani","leo","bia","gui","nina","caio","tati"];
  PLAYERS = ids.map((id,i)=>({id,name:["Rafa","Dani","Leo","Bia","Gui","Nina","Caio","Tati"][i]}));
  const days=[1,3,4,7,9,12,14,16,18,21,23,25,27,29];
  MATCHES = days.map((day,i)=>{
    const a=PLAYERS[i%PLAYERS.length], b=PLAYERS[(i+3)%PLAYERS.length], winner=i%3?a:b;
    return {
      id:"demo-"+i, player_a:a.id, player_b:b.id, winner_id:winner.id, status:"finished",
      played_at:new Date(2026,5,day,21,15).toISOString(),
      ball_log:[2,5,8,11,4,13,1].slice(0,3+(i%5)).map((ball,k)=>({n:k+1,ball:String(ball),by:k%2?a.id:b.id,type:"pot",brk:k===0&&i%4===0}))
    };
  });
  FINISHED = MATCHES.slice();
  liveMatch = DEMO_START_FORM ? null : {
    id:"demo-live", player_a:PLAYERS[1].id, player_b:PLAYERS[4].id, status:"live",
    played_at:new Date().toISOString(), ball_log:[{n:1,ball:"3",by:PLAYERS[1].id,type:"pot",brk:true}]
  };
  if(liveMatch) MATCHES.push(liveMatch);
  computeStats();
}

function pName(id){return (PLAYERS.find(p=>p.id===id)||{}).name || "?";}
function pById(id){return PLAYERS.find(p=>p.id===id);}

function statsFor(matches){
  const S={};
  PLAYERS.forEach(p=>S[p.id]={id:p.id,name:p.name,wins:0,losses:0,total:0,pct:0,curStreak:0,bestStreak:0,history:[]});
  matches.forEach(m=>{
    const loser = m.winner_id===m.player_a ? m.player_b : m.player_a;
    if(S[m.winner_id]){S[m.winner_id].wins++;S[m.winner_id].total++;}
    if(S[loser]){S[loser].losses++;S[loser].total++;}
    [m.winner_id,loser].forEach(id=>S[id]&&S[id].history.push({m,won:id===m.winner_id}));
  });
  Object.values(S).forEach(s=>{
    s.pct = s.total ? Math.round(s.wins/s.total*100) : 0;
    let cur=0,best=0;
    s.history.forEach(h=>{ if(h.won){cur++;best=Math.max(best,cur);} else cur=0; });
    s.bestStreak=best; s.curStreak=cur;
  });
  return S;
}
function computeStats(){ STATS=statsFor(FINISHED); }

function rankedFrom(S){
  return Object.values(S).slice().sort((a,b)=>
    b.wins-a.wins || b.pct-a.pct || a.losses-b.losses || a.name.localeCompare(b.name));
}
function ranked(){ return rankedFrom(STATS); }

/* longest run de bolas seguidas pelo mesmo jogador (em qualquer partida) */
function ballRunRecord(matches){
  matches=matches||FINISHED;
  let best={count:0,playerId:null,matchId:null};
  matches.forEach(m=>{
    const log=Array.isArray(m.ball_log)?m.ball_log:[];
    let run=0,last=null;
    log.forEach(e=>{
      const num=parseInt(e.ball,10);
      const isPot = e.type!=='foul' && num>=1 && num<=15; // falta/branca quebram a sequencia
      if(isPot && e.by===last){ run++; }
      else if(isPot){ run=1; last=e.by; }
      else { run=0; last=null; }
      if(isPot && run>best.count) best={count:run,playerId:e.by,matchId:m.id};
    });
  });
  return best;
}

function foulReasonText(reason){
  return ({oponente:'bola do oponente', trunfo:'bola 1 cedo', branca:'branca', juiz:'juiz derrubou'})[reason] || '';
}

/* contagem de faltas por jogador (exclui o drop do juiz, que é penalidade) */
function foulCounts(matches){
  matches=matches||FINISHED;
  const c={};
  PLAYERS.forEach(p=>c[p.id]={id:p.id,name:p.name,total:0,oponente:0});
  matches.forEach(m=>{
    (m.ball_log||[]).forEach(e=>{
      if(e.type!=='foul' || e.reason==='juiz' || !c[e.by]) return;
      c[e.by].total++;
      if(e.reason==='oponente') c[e.by].oponente++;
    });
  });
  return c;
}

/* bolas encaçapadas no estouro por jogador */
function breakCounts(matches){
  matches=matches||FINISHED;
  const c={};
  PLAYERS.forEach(p=>c[p.id]={id:p.id,name:p.name,count:0});
  matches.forEach(m=>{
    (m.ball_log||[]).forEach(e=>{ if(e.brk && c[e.by]) c[e.by].count++; });
  });
  return c;
}

const MES=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
function monthKey(ts){ const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(key){ const [y,m]=key.split('-'); const s=MES[+m-1]; return s.charAt(0).toUpperCase()+s.slice(1)+'/'+y.slice(2); }
function monthChips(){
  if(!FINISHED.length) return [];
  const dates=FINISHED.map(m=>new Date(m.played_at).getTime());
  let d=new Date(Math.min(...dates)), end=new Date();
  let y=d.getFullYear(), mo=d.getMonth(); const out=[];
  while(y<end.getFullYear() || (y===end.getFullYear() && mo<=end.getMonth())){
    out.push(`${y}-${String(mo+1).padStart(2,'0')}`); mo++; if(mo>11){mo=0;y++;}
  }
  return out;
}

let recMonth=""; // "" = geral; senão "YYYY-MM"
function renderRecords(){
  let html=`<div class="view-head"><div><div class="eyebrow">hall da fama</div><div class="viewtitle">Records</div></div></div>`;
  if(!FINISHED.length){return view.innerHTML=html+`<div class="empty">Sem records ainda. Joguem aí!</div>`;}

  // régua de meses
  const chips=monthChips();
  const chipBtn=(key,label)=>`<button class="mchip ${recMonth===key?'active':''}" onclick="recMonth='${key}';renderRecords()">${label}</button>`;
  html+=`<div class="months">${chipBtn("","Geral")}${chips.map(k=>chipBtn(k,monthLabel(k))).join("")}</div>`;

  // conjunto filtrado
  const set = recMonth ? FINISHED.filter(m=>monthKey(m.played_at)===recMonth) : FINISHED;
  if(recMonth){
    html+=`<div class="rank-sub" style="margin:0 0 14px">mostrando <b style="color:var(--gold)">${monthLabel(recMonth)}</b> · ${set.length} jogo${set.length!==1?"s":""}</div>`;
  }
  if(!set.length){ return view.innerHTML=html+`<div class="empty">Nenhuma partida nesse mês.</div>`; }

  const S=statsFor(set), r=rankedFrom(S);
  const vals=Object.values(S);
  const mostWins=r[0];
  const bestStreak=vals.slice().sort((a,b)=>b.bestStreak-a.bestStreak)[0];
  const mostGames=vals.slice().sort((a,b)=>b.total-a.total)[0];
  const bestPct=vals.filter(s=>s.total>=3).sort((a,b)=>b.pct-a.pct)[0];
  const onFire=r.filter(s=>s.curStreak>=2).sort((a,b)=>b.curStreak-a.curStreak)[0];
  const lanterna=vals.filter(s=>s.total>0).sort((a,b)=>b.losses-a.losses)[0];
  const ballRec=ballRunRecord(set);
  const fc=Object.values(foulCounts(set));
  const mostFouls=fc.slice().sort((a,b)=>b.total-a.total)[0];
  const mostOpp=fc.slice().sort((a,b)=>b.oponente-a.oponente)[0];
  const bc=Object.values(breakCounts(set));
  const mostBreak=bc.slice().sort((a,b)=>b.count-a.count)[0];

  if(recMonth){
    html+=`<div class="card" style="margin-bottom:14px;text-align:center;border-color:rgba(244,196,48,.4);background:linear-gradient(100deg,rgba(244,196,48,.1),var(--card) 55%)">
      <div class="eyebrow" style="color:var(--gold)">melhor do mês</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px">
        ${playerBall(pById(mostWins.id),46)}
        <div style="text-align:left"><div style="font-family:'Anton';font-size:25px;line-height:1">${esc(mostWins.name)}</div>
        <div class="rank-sub">${mostWins.wins}V · ${mostWins.losses}D · ${mostWins.pct}%</div></div>
      </div>
    </div>`;
  }

  const rec=(label,val,holder,cls="")=>`<div class="rec ${cls}"><div class="label">${label}</div><div class="val stat-num">${val}</div><div class="holder">${holder}</div></div>`;
  const hold=(o,v)=> o&&v?esc(o.name):"ninguém ainda";
  html+=`<div class="rec-grid">
    ${rec("mais vitórias", mostWins.wins, esc(mostWins.name))}
    ${rec("maior seq. na mesa", bestStreak.bestStreak, esc(bestStreak.name))}
    ${rec("mais bolas em sequência", ballRec.count||"—", ballRec.playerId?esc(pName(ballRec.playerId)):"sem registro")}
    ${rec("mata no estouro", mostBreak&&mostBreak.count?mostBreak.count:"—", hold(mostBreak,mostBreak&&mostBreak.count))}
    ${rec("rei da falta", mostFouls&&mostFouls.total?mostFouls.total:"—", hold(mostFouls,mostFouls&&mostFouls.total))}
    ${rec("mata bola alheia", mostOpp&&mostOpp.oponente?mostOpp.oponente:"—", hold(mostOpp,mostOpp&&mostOpp.oponente))}
    ${rec("mais jogos", mostGames.total, esc(mostGames.name))}
    ${rec("lanterna (mais derrotas)", lanterna&&lanterna.losses?lanterna.losses:"—", hold(lanterna,lanterna&&lanterna.losses))}
    ${bestPct?rec("melhor aproveitamento", bestPct.pct+"%", esc(bestPct.name)+" (3+ jogos)","full"):""}
    ${onFire?rec("pegando fogo agora", "▲ "+onFire.curStreak, esc(onFire.name)+" em sequência","full"):""}
  </div>`;
  view.innerHTML=html;
}

  const name=inp.value.trim();
  if(!name){toast("Digite um nome");return;}
  if(PLAYERS.some(p=>p.name.toLowerCase()===name.toLowerCase())){toast("Esse jogador já existe");return;}
  const {data,error}=await sb.from("players").insert({name}).select().single();
  if(error){toast("Erro: "+error.message);return;}
  PLAYERS.push(data); PLAYERS.sort((a,b)=>a.name.localeCompare(b.name));
  computeStats();
  toast(name+" cadastrado");
  renderAdmin();
}

let pendingNew={}; // {pa:'nome', pb:'nome'}
let livePotter='a';   // quem encaçapou a proxima bola
let liveWinner=null;  // 'a' | 'b' ao finalizar
let foulMode=false;   // proxima bola numerada cai por falta (juiz)
let estouroMode=false; // bolas marcadas caíram no estouro (não definem grupo)

function onPick(){
  let nw="";
  ["pa","pb"].forEach(id=>{
    const el=$("#"+id); if(!el) return;
    if(el.value!=="__new"){ delete pendingNew[id]; return; }
    nw+=`<label class="fld"><span>nome do novo jogador (${id==="pa"?"A":"B"})</span>
      <input class="search" style="margin:0" value="${esc(pendingNew[id]||"")}" oninput="pendingNew['${id}']=this.value"></label>`;
  });
  const w=$("#newWrap"); if(w) w.innerHTML=nw;
}

async function ensurePlayer(slot){
  const sel=$("#"+slot).value;
  if(sel!=="__new") return sel;
  const name=(pendingNew[slot]||"").trim();
  if(!name) throw new Error("Faltou o nome do novo jogador "+(slot==="pa"?"A":"B"));
  const existing=PLAYERS.find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(existing) return existing.id;
  const {data,error}=await sb.from("players").insert({name}).select().single();
  if(error) throw error;
  PLAYERS.push(data);
  return data.id;
}

/* ---------- partida ao vivo ---------- */
async function startMatch(){
  const btn=$("#startBtn"); if(btn){btn.disabled=true; btn.textContent="Iniciando...";}
  try{
    const aId=await ensurePlayer("pa");
    const bId=await ensurePlayer("pb");
    if(aId===bId) throw new Error("Jogador A e B não podem ser a mesma pessoa");
    const whenVal=$("#when").value;
    const played_at = whenVal ? new Date(whenVal).toISOString() : new Date().toISOString();
    const {error}=await sb.from("matches").insert({player_a:aId,player_b:bId,played_at,ball_log:[],status:'live'});
    if(error) throw error;
    pendingNew={}; livePotter='a'; liveWinner=null; foulMode=false; estouroMode=false;
    await load();
    render();
    toast("Partida iniciada");
  }catch(err){
    toast("Erro: "+err.message);
    if(btn){btn.disabled=false; btn.textContent="Iniciar partida";}
  }
}

      <div class="vs" style="font-size:17px">VS</div>
      <div style="text-align:center">${playerBall(b,46)}<div style="margin-top:6px;font-weight:700">${esc(b?.name)}</div>${gtag(m.player_b)}</div>
    </div>

    <div class="eyebrow" style="margin-bottom:8px">quem ${foulMode?"cometeu a falta":estouroMode?"deu o estouro":"encaçapou"}?</div>
    <div class="row2" style="margin-bottom:10px">
      <button class="btn ${livePotter==='a'?'chalk':'ghost'} small" style="width:100%" onclick="setPotter('a')">${esc(a?.name)}</button>
      <button class="btn ${livePotter==='b'?'chalk':'ghost'} small" style="width:100%" onclick="setPotter('b')">${esc(b?.name)}</button>
    </div>
    <div class="row2" style="margin-bottom:18px">
      <button class="btn small" style="width:100%;${foulMode?'background:var(--clay);color:#fff':'background:transparent;border:1px solid var(--clay);color:var(--clay)'}" onclick="toggleFoul()">${foulMode?"Falta ativa ✕":"Falta (juiz derruba)"}</button>
      <button class="btn small" style="width:100%;${estouroMode?'background:var(--chalk);color:#062028':'background:transparent;border:1px solid var(--chalk);color:var(--chalk)'}" onclick="toggleEstouro()">${estouroMode?"Estouro ativo ✕":"Estouro"}</button>
    </div>

    <div class="eyebrow" style="margin-bottom:10px">${
      foulMode?'<span style="color:var(--clay)">modo falta — toque na bola que o juiz derrubou</span>'
      :estouroMode?'<span style="color:var(--chalk)">modo estouro — toque nas bolas que caíram no saque (não definem grupo)</span>'
      :"marcar bola"}</div>
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:11px;margin-bottom:6px">
      ${avail.map(n=>`<button class="ballbtn" onclick="onBallTap(${n})">${poolBallHTML(n,44)}</button>`).join("")}
      <button class="ballbtn" onclick="logBall('branca','foul','branca')" title="bola branca (scratch / falta)">${whiteBallHTML(44)}</button>
    </div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:18px">a branca (scratch) conta como falta e nunca sai das opções</div>

    <div class="eyebrow" style="margin-bottom:8px">sequência da partida</div>
    <div id="liveLog"></div>

    <hr class="brass">
    <div class="eyebrow" style="margin-bottom:8px">finalizar — quem ganhou? (matou a bola 1 / castigo)</div>
    <div class="row2" style="margin-bottom:14px">
      <button class="btn ${liveWinner==='a'?'':'ghost'} small" style="width:100%" onclick="setWinner('a')">${esc(a?.name)}</button>
      <button class="btn ${liveWinner==='b'?'':'ghost'} small" style="width:100%" onclick="setWinner('b')">${esc(b?.name)}</button>
    </div>
    <button class="btn" id="finBtn" ${liveWinner?'':'disabled'} onclick="finalizeMatch()">Finalizar partida</button>
    <button class="btn ghost small" style="width:100%;margin-top:10px;border-color:var(--clay);color:var(--clay)" onclick="cancelMatch()">Cancelar partida</button>
  </div>`;

function setPotter(s){ livePotter=s; renderAdmin(); }
function setWinner(s){ liveWinner=s; renderAdmin(); }

function drawLiveLog(){
  const el=$("#liveLog"); if(!el)return;
  const log=Array.isArray(liveMatch.ball_log)?liveMatch.ball_log:[];
  if(!log.length){el.innerHTML=`<div style="color:var(--muted);font-size:13px;margin-bottom:10px">Nenhuma bola ainda. Vá marcando conforme o jogo rola.</div>`;return;}
  el.innerHTML=log.map((e,i)=>{
    const foul=e.type==='foul';
    const rsn=foul&&foulReasonText(e.reason)?` (${foulReasonText(e.reason)})`:"";
    const desc=foul?`<span style="color:var(--clay)">falta de ${esc(pName(e.by))}${rsn}</span>`
      :e.brk?`${esc(pName(e.by))} <span style="color:var(--chalk)">(estouro)</span>`
      :esc(pName(e.by));
    return `<div class="ballrow"><span class="n">${i+1}</span>${ballLabelHTML(e.ball,26)}
      <span style="margin-left:8px;color:var(--muted)">— ${desc}</span>
      <span style="margin-left:auto;cursor:pointer;color:var(--clay)" onclick="removeLiveBall(${i})">remover</span></div>`;
  }).join("");
}

function toggleFoul(){ foulMode=!foulMode; renderAdmin(); }
// grupos: balls pares vs impares (2-15). bola 1 = trunfo, fora dos grupos.
const EVEN_BALLS=[2,4,6,8,10,12,14], ODD_BALLS=[3,5,7,9,11,13,15];
function groupBalls(g){ return g==='even'?EVEN_BALLS:ODD_BALLS; }
function groupLabel(g){ return g==='even'?'Pares':g==='odd'?'Ímpares':''; }

// define o grupo de cada jogador a partir do log (1a bola legal define)
function deriveGroups(log){
  const m=liveMatch||{}, g={};
  for(const e of (log||[])){
    const num=parseInt(e.ball,10);
    if(num>=2 && num<=15 && e.type!=='foul' && !e.brk && !g[e.by]){
      const par=num%2===0?'even':'odd';
      g[e.by]=par;
      const other=e.by===m.player_a?m.player_b:m.player_a;
      if(!g[other]) g[other]=par==='even'?'odd':'even';
    }
  }
  return g;
}

// classifica uma tacada normal segundo a regra de sinuca
function classifyPot(ball){
  const log=liveMatch.ball_log||[];
  const by=livePotter==='a'?liveMatch.player_a:liveMatch.player_b;
  const g=deriveGroups(log), myGroup=g[by]||null;
  const num=parseInt(ball,10);
  const down=new Set(log.map(e=>parseInt(e.ball,10)).filter(n=>n>=1&&n<=15));
  if(num===1){
    if(myGroup && groupBalls(myGroup).every(b=>down.has(b))) return {type:'pot'};
    return {type:'foul',reason:'trunfo'};            // bola 1 cedo demais
  }
  if(num>=2 && num<=15){
    if(!myGroup) return {type:'pot'};                // 1a bola: define o grupo
    const par=num%2===0?'even':'odd';
    return par===myGroup ? {type:'pot'} : {type:'foul',reason:'oponente'};
  }
  return {type:'pot'};
}

function onBallTap(n){
  if(estouroMode){ logBall(n,'pot',null,true); return; } // estouro: não define grupo, fica ativo
  if(foulMode){ logBall(n,'foul','juiz'); return; }
  const cls=classifyPot(n);
  if(cls.type==='foul'){
    const who=esc(pName(livePotter==='a'?liveMatch.player_a:liveMatch.player_b));
    toast(cls.reason==='oponente'?`Falta! ${who} matou bola do oponente`:`Falta! bola 1 cedo demais`);
  }
  logBall(n, cls.type, cls.reason);
}
function toggleFoul(){ foulMode=!foulMode; if(foulMode) estouroMode=false; renderAdmin(); }
function toggleEstouro(){ estouroMode=!estouroMode; if(estouroMode) foulMode=false; renderAdmin(); }

async function logBall(ball, type, reason, brk){
  const by = livePotter==='a' ? liveMatch.player_a : liveMatch.player_b;
  const log=Array.isArray(liveMatch.ball_log)?liveMatch.ball_log.slice():[];
  const entry={n:log.length+1, ball:String(ball), by, type:type||'pot'};
  if(reason) entry.reason=reason;
  if(brk) entry.brk=true;
  log.push(entry);
  liveMatch.ball_log=log;
  if(!brk) foulMode=false;   // no estouro o modo continua ativo p/ marcar varias bolas
  renderAdmin();
  const {error}=await sb.from("matches").update({ball_log:log}).eq("id",liveMatch.id);
  if(error) toast("Erro ao salvar");
}

async function removeLiveBall(i){
  const log=(liveMatch.ball_log||[]).slice();
  log.splice(i,1); log.forEach((e,idx)=>e.n=idx+1);
  liveMatch.ball_log=log;
  renderAdmin();
  const {error}=await sb.from("matches").update({ball_log:log}).eq("id",liveMatch.id);
  if(error) toast("Erro ao remover");
}

async function finalizeMatch(){
  if(!liveWinner){toast("Escolha o vencedor");return;}
  const winner_id = liveWinner==='a' ? liveMatch.player_a : liveMatch.player_b;
  const btn=$("#finBtn"); if(btn){btn.disabled=true; btn.textContent="Finalizando...";}
  const {error}=await sb.from("matches").update({winner_id,status:'finished'}).eq("id",liveMatch.id);
  if(error){toast("Erro: "+error.message); if(btn){btn.disabled=false; btn.textContent="Finalizar partida";} return;}
  liveWinner=null; livePotter='a'; foulMode=false; estouroMode=false;
  await load();
  toast("Partida finalizada!");
  go("partidas");
}

async function cancelMatch(){
  if(!confirm("Cancelar a partida em andamento? O que já foi marcado será apagado."))return;
  const {error}=await sb.from("matches").delete().eq("id",liveMatch.id);
  if(error){toast("Erro ao cancelar");return;}
  liveWinner=null; livePotter='a'; foulMode=false; estouroMode=false;
  await load(); render(); toast("Partida cancelada");
}

/* ---------- auth ---------- */
async function doLogin(){
  if(!sb){toast("Configure o Supabase para usar o admin");return;}
  const email=$("#email").value.trim(), password=$("#pass").value;
  const btn=$("#loginBtn"); btn.disabled=true; btn.textContent="Entrando...";
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ $("#loginErr").textContent="Não rolou: "+error.message; btn.disabled=false; btn.textContent="Entrar"; return; }
  await refreshAuth(); toast("Bem-vindo, admin"); render(); buildNav();
}
async function doLogout(){ if(sb) await sb.auth.signOut(); await refreshAuth(); go("ranking"); buildNav(); toast("Saiu do admin"); }
async function refreshAuth(){
  if(!sb){
    isAdmin=DEMO_MODE;
    $("#whoami").innerHTML=DEMO_MODE?'<b>demo</b><br>responsivo':"modo leitura";
    return;
  }
  const {data}=await sb.auth.getSession();
  isAdmin=!!data.session;
  $("#whoami").innerHTML=isAdmin?'<b>admin</b><br>pode lançar':"modo leitura";
}

/* ---------- sheets (perfil / partida) ---------- */
function openSheet(html){ $("#sheet").innerHTML=`<div class="grip"></div>`+html; $("#sheetBg").classList.add("open"); }
function closeSheet(){ $("#sheetBg").classList.remove("open"); }
$("#sheetBg").addEventListener("click",e=>{if(e.target.id==="sheetBg")closeSheet();});

function openPlayer(id){
  const s=STATS[id]; if(!s)return;
  const rank=ranked().findIndex(x=>x.id===id)+1;
  const recent=s.history.slice().reverse().slice(0,12);
  openSheet(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
      ${playerBall({name:s.name},56)}
      <div><div style="font-family:'Anton';font-size:27px;line-height:1">${esc(s.name)}</div>
      <div class="rank-sub">#${rank} no ranking</div></div>
    </div>
    <div class="row2" style="margin:16px 0">
      <div class="card" style="text-align:center"><div class="pct stat-num" style="font-size:27px;color:var(--gold)">${s.wins}</div><div class="rank-sub">vitórias</div></div>
      <div class="card" style="text-align:center"><div class="pct stat-num" style="font-size:27px;color:var(--clay)">${s.losses}</div><div class="rank-sub">derrotas</div></div>
      <div class="card" style="text-align:center"><div class="pct stat-num" style="font-size:27px">${s.pct}%</div><div class="rank-sub">aprov.</div></div>
    </div>

    <div class="eyebrow" style="margin:14px 0 8px">últimos jogos</div>
    ${recent.length? recent.map(h=>{
      const m=h.m, opp=pById(m.player_a===id?m.player_b:m.player_a);
      return `<div class="ballrow"><span class="dtag">${fmtDate(m.played_at)}</span>
        <b style="color:${h.won?'var(--gold)':'var(--clay)'}">${h.won?'V':'D'}</b>
        <span>vs ${esc(opp?.name)}</span></div>`;
    }).join("") : `<div class="empty">Sem jogos ainda.</div>`}
  `);
}

function openMatch(id){
  const m=MATCHES.find(x=>x.id===id); if(!m)return;
  const a=pById(m.player_a),b=pById(m.player_b),w=m.winner_id?pById(m.winner_id):null;

  openSheet(`
    <div style="text-align:center;margin-bottom:6px">
      <div class="rank-sub">${fmtFull(m.played_at)}</div>
      <div style="display:flex;align-items:center;justify-content:space-around;margin-top:14px">
        <div>${playerBall(a,48)}<div style="margin-top:6px;font-weight:700;${m.winner_id===a.id?'color:var(--gold)':''}">${esc(a.name)}</div></div>
        <div class="vs" style="font-size:19px">VS</div>
        <div>${playerBall(b,48)}<div style="margin-top:6px;font-weight:700;${m.winner_id===b.id?'color:var(--gold)':''}">${esc(b.name)}</div></div>
      </div>
      <div style="margin-top:12px">${live?'<span style="color:var(--chalk)">● em andamento</span>':`venceu <b style="color:var(--gold)">${esc(w?.name)}</b>`}</div>
    </div>
    <hr class="brass">
    <div class="eyebrow" style="margin-bottom:10px">ordem das bolas</div>
    ${log.length? log.map(e=>{
        const foul=e.type==='foul';
        const rsn=foul&&foulReasonText(e.reason)?` (${foulReasonText(e.reason)})`:"";
        const desc=foul?`<span style="color:var(--clay)">falta de ${esc(pName(e.by))}${rsn}</span>`
          :e.brk?`${esc(pName(e.by))} <span style="color:var(--chalk)">(estouro)</span>`
          :esc(pName(e.by));
        return `<div class="ballrow"><span class="n">${e.n}</span>${ballLabelHTML(e.ball,26)}<span style="margin-left:8px;color:var(--muted)">— ${desc}</span></div>`;
      }).join("")
      : `<div class="empty" style="padding:18px">${live?"Ainda sem bolas marcadas.":"Essa partida não teve a ordem das bolas registrada."}</div>`}
    ${isAdmin&&!live?`<button class="btn ghost" style="margin-top:16px;border-color:var(--clay);color:var(--clay)" onclick="delMatch('${m.id}')">Apagar partida</button>`:""}
  `);
}
async function delMatch(id){
  if(!confirm("Apagar essa partida? Não dá pra desfazer."))return;
  const {error}=await sb.from("matches").delete().eq("id",id);
  if(error){toast("Erro ao apagar");return;}
  closeSheet(); await load(); render(); toast("Partida apagada");
}
